<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f2f4f8;
            text-align: center;
        }

        header {
            background: #007BFF;
            color: white;
            padding: 20px;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1 {
            margin: 0;
        }

        p {
            color: #555;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e7e34;
        }

        footer {
            margin-top: 40px;
            padding: 10px;
            background: #ddd;
        }
    </style>
</head>

<body>

<header>
    <h1>Daniyal Akhtar</h1>
    <p>Web Developer | Student</p>
</header>

<div class="container">
    <div class="card">
        <h2>About Me</h2>
        <p>I am a student learning web development and GitHub deployment.</p>

        <button onclick="updateText()">Click to Update</button>
        <p id="msg"></p>
    </div>
</div>

<footer>
    © 2026 My Portfolio Website
</footer>

<script>
    function updateText() {
        document.getElementById("msg").innerText =
        "Website updated successfully 🚀";
    }
</script>

</body>
</html>
